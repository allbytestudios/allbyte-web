name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          # Sync site build, but preserve game assets uploaded separately
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} \
            --delete \
            --exclude "assets/*" \
            --exclude "Anthem2.mp3" \
            --exclude "cursor-move.wav" \
            --exclude "ChroniclesOfNesisTitle.gif" \
            --exclude "ChroniclesOfNesisTitle-still.png" \
            --exclude "ChroniclesOfNesisTitleName.png" \
            --exclude "BattleChargeRight.gif" \
            --exclude "BattleChargeRight-still.png" \
            --exclude "Flourish.png" \
            --exclude "leftSword.png" \
            --exclude "verticalSwordTHIN.png" \
            --exclude "fonts/ModernGoth.otf"

          # Override cache headers for HTML files (must revalidate)
          aws s3 cp s3://${{ secrets.AWS_S3_BUCKET }} s3://${{ secrets.AWS_S3_BUCKET }} \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Verify deployment
        run: |
          echo "Waiting for CloudFront invalidation to propagate..."
          sleep 15

          # Test homepage
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://allbyte.studio)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Homepage returned $STATUS"
            exit 1
          fi
          echo "PASS: Homepage returned 200"

          # Test self-hosting redirect
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://allbyte.studio/self-hosting-with-claude/)
          if [ "$STATUS" != "301" ]; then
            echo "FAIL: Self-hosting redirect returned $STATUS (expected 301)"
            exit 1
          fi
          echo "PASS: Self-hosting redirect returned 301"

          # Test play page
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://allbyte.studio/play/)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Play page returned $STATUS"
            exit 1
          fi
          echo "PASS: Play page returned 200"

          # Test HTTPS headers
          HEADERS=$(curl -sI https://allbyte.studio)
          if echo "$HEADERS" | grep -q "cross-origin-opener-policy: same-origin"; then
            echo "PASS: COOP header present"
          else
            echo "FAIL: Missing COOP header"
            exit 1
          fi

          if echo "$HEADERS" | grep -q "cross-origin-embedder-policy: require-corp"; then
            echo "PASS: COEP header present"
          else
            echo "FAIL: Missing COEP header"
            exit 1
          fi

          if echo "$HEADERS" | grep -q "strict-transport-security"; then
            echo "PASS: HSTS header present"
          else
            echo "FAIL: Missing HSTS header"
            exit 1
          fi

          echo "All integration tests passed!"
