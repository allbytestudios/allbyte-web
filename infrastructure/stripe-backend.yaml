AWSTemplateFormatVersion: "2010-09-09"
Description: AllByte Studios backend (Auth + Stripe + API Gateway + Lambda + DynamoDB)

Parameters:
  StripePriceInitiate:
    Type: String
    Default: price_1TJfoPL0A07AB3XunnJwtSwi
  StripePriceHero:
    Type: String
    Default: price_1TJfoQL0A07AB3XuczyqJc99
  StripePriceLegend:
    Type: String
    Default: price_1TJfoQL0A07AB3Xu9WXvyUvs
  StripePriceDonate5:
    Type: String
    Default: price_1TJfoRL0A07AB3XuzHlal9l6
  StripePriceDonate10:
    Type: String
    Default: price_1TJfoRL0A07AB3XulyU6BbL0
  StripePriceDonate25:
    Type: String
    Default: price_1TJfoSL0A07AB3XuKo0Mea0w
  SiteDomain:
    Type: String
    Default: https://allbyte.studio

Resources:
  # --- DynamoDB Tables ---
  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: allbyte-studio-subscriptions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: allbyte-studio-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # --- IAM Role for Lambdas ---
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: allbyte-studio-stripe-lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackendPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt SubscriptionsTable.Arn
                  - !GetAtt UsersTable.Arn
                  - !Sub "${UsersTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:ListSecrets
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:allbyte-studio/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  # --- Lambda: Auth Signup ---
  SignupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-auth-signup
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SITE_DOMAIN: !Ref SiteDomain
      Code:
        ZipFile: |
          import json
          import os
          import uuid
          import hashlib
          import hmac
          import base64
          import time
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "POST,OPTIONS",
          }

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def hash_password(password, salt=None):
              if salt is None:
                  salt = os.urandom(32)
              dk = hashlib.pbkdf2_hmac("sha256", password.encode(), salt, 600000)
              return base64.b64encode(salt).decode() + ":" + base64.b64encode(dk).decode()

          def sign_jwt(payload, secret):
              header = base64.urlsafe_b64encode(json.dumps({"alg": "HS256", "typ": "JWT"}).encode()).rstrip(b"=").decode()
              body = base64.urlsafe_b64encode(json.dumps(payload).encode()).rstrip(b"=").decode()
              sig_input = f"{header}.{body}"
              sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              return f"{header}.{body}.{sig}"

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              body = json.loads(event.get("body", "{}"))
              email = body.get("email", "").strip().lower()
              password = body.get("password", "")
              username = body.get("username", "").strip()

              if not email or "@" not in email:
                  return err(400, "Valid email required")
              if len(password) < 8:
                  return err(400, "Password must be at least 8 characters")
              if not username:
                  return err(400, "Username required")

              # Check if email already exists
              resp = users.query(
                  IndexName="email-index",
                  KeyConditionExpression="email = :e",
                  ExpressionAttributeValues={":e": email},
              )
              if resp.get("Items"):
                  return err(409, "Email already registered")

              user_id = str(uuid.uuid4())
              pw_hash = hash_password(password)
              now = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

              users.put_item(Item={
                  "userId": user_id,
                  "email": email,
                  "username": username,
                  "passwordHash": pw_hash,
                  "createdAt": now,
              })

              jwt_secret = get_jwt_secret()
              token = sign_jwt({
                  "sub": user_id,
                  "email": email,
                  "username": username,
                  "exp": int(time.time()) + 7 * 86400,
              }, jwt_secret)

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({
                      "token": token,
                      "user": {"userId": user_id, "email": email, "username": username},
                  }),
              }

  # --- Lambda: Auth Login ---
  LoginFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-auth-login
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SUBSCRIPTIONS_TABLE: !Ref SubscriptionsTable
          SITE_DOMAIN: !Ref SiteDomain
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
          subs = boto3.resource("dynamodb").Table(os.environ["SUBSCRIPTIONS_TABLE"])

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "POST,OPTIONS",
          }

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_password(password, stored):
              salt_b64, hash_b64 = stored.split(":")
              salt = base64.b64decode(salt_b64)
              expected = base64.b64decode(hash_b64)
              dk = hashlib.pbkdf2_hmac("sha256", password.encode(), salt, 600000)
              return hmac.compare_digest(dk, expected)

          def sign_jwt(payload, secret):
              header = base64.urlsafe_b64encode(json.dumps({"alg": "HS256", "typ": "JWT"}).encode()).rstrip(b"=").decode()
              body = base64.urlsafe_b64encode(json.dumps(payload).encode()).rstrip(b"=").decode()
              sig_input = f"{header}.{body}"
              sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              return f"{header}.{body}.{sig}"

          def get_tier(stripe_customer_id):
              if not stripe_customer_id:
                  return None
              price_to_tier = {
                  os.environ["PRICE_INITIATE"]: "initiate",
                  os.environ["PRICE_HERO"]: "hero",
                  os.environ["PRICE_LEGEND"]: "legend",
              }
              try:
                  resp = subs.get_item(Key={"customerId": stripe_customer_id})
                  item = resp.get("Item", {})
                  if item.get("status") == "active":
                      return price_to_tier.get(item.get("priceId"))
              except Exception:
                  pass
              return None

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              body = json.loads(event.get("body", "{}"))
              email = body.get("email", "").strip().lower()
              password = body.get("password", "")

              if not email or not password:
                  return err(400, "Email and password required")

              resp = users.query(
                  IndexName="email-index",
                  KeyConditionExpression="email = :e",
                  ExpressionAttributeValues={":e": email},
              )
              items = resp.get("Items", [])
              if not items:
                  return err(401, "Invalid email or password")

              user = items[0]
              if not verify_password(password, user["passwordHash"]):
                  return err(401, "Invalid email or password")

              tier = get_tier(user.get("stripeCustomerId"))
              jwt_secret = get_jwt_secret()
              token = sign_jwt({
                  "sub": user["userId"],
                  "email": user["email"],
                  "username": user["username"],
                  "exp": int(time.time()) + 7 * 86400,
              }, jwt_secret)

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({
                      "token": token,
                      "user": {
                          "userId": user["userId"],
                          "email": user["email"],
                          "username": user["username"],
                          "tier": tier,
                          "stripeCustomerId": user.get("stripeCustomerId"),
                      },
                  }),
              }

  # --- Lambda: Auth Me (verify token, get profile) ---
  MeFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-auth-me
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SUBSCRIPTIONS_TABLE: !Ref SubscriptionsTable
          SITE_DOMAIN: !Ref SiteDomain
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
          subs = boto3.resource("dynamodb").Table(os.environ["SUBSCRIPTIONS_TABLE"])

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "GET,OPTIONS",
          }

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_jwt(token, secret):
              parts = token.split(".")
              if len(parts) != 3:
                  return None
              sig_input = f"{parts[0]}.{parts[1]}"
              expected_sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              if not hmac.compare_digest(parts[2], expected_sig):
                  return None
              # Decode payload (add padding)
              payload_b64 = parts[1] + "=" * (4 - len(parts[1]) % 4)
              payload = json.loads(base64.urlsafe_b64decode(payload_b64))
              if payload.get("exp", 0) < time.time():
                  return None
              return payload

          def get_tier(stripe_customer_id):
              if not stripe_customer_id:
                  return None
              price_to_tier = {
                  os.environ["PRICE_INITIATE"]: "initiate",
                  os.environ["PRICE_HERO"]: "hero",
                  os.environ["PRICE_LEGEND"]: "legend",
              }
              try:
                  resp = subs.get_item(Key={"customerId": stripe_customer_id})
                  item = resp.get("Item", {})
                  if item.get("status") == "active":
                      return price_to_tier.get(item.get("priceId"))
              except Exception:
                  pass
              return None

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              auth = event.get("headers", {}).get("authorization", "")
              if not auth.startswith("Bearer "):
                  return err(401, "No token provided")

              token = auth[7:]
              jwt_secret = get_jwt_secret()
              payload = verify_jwt(token, jwt_secret)
              if not payload:
                  return err(401, "Invalid or expired token")

              resp = users.get_item(Key={"userId": payload["sub"]})
              user = resp.get("Item")
              if not user:
                  return err(401, "User not found")

              tier = get_tier(user.get("stripeCustomerId"))

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({
                      "user": {
                          "userId": user["userId"],
                          "email": user["email"],
                          "username": user["username"],
                          "tier": tier,
                          "stripeCustomerId": user.get("stripeCustomerId"),
                      },
                  }),
              }

  # --- Lambda: OAuth Start (redirect to provider) ---
  OAuthStartFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-oauth-start
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          SITE_DOMAIN: !Ref SiteDomain
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import urllib.parse
          import boto3

          PROVIDERS = {
              "google": {
                  "secret_name": "allbyte-studio/google-oauth",
                  "auth_url": "https://accounts.google.com/o/oauth2/v2/auth",
                  "scope": "openid email profile",
              },
              "discord": {
                  "secret_name": "allbyte-studio/discord-oauth",
                  "auth_url": "https://discord.com/api/oauth2/authorize",
                  "scope": "identify email",
              },
          }

          def get_secret(name):
              if name not in _cache:
                  sm = boto3.client("secretsmanager")
                  raw = sm.get_secret_value(SecretId=name)["SecretString"].strip().strip("{}")
                  parts = {}
                  for pair in raw.split(","):
                      key, _, value = pair.partition(":")
                      parts[key.strip()] = value.strip()
                  _cache[name] = {"client_id": parts["client_id"], "client_secret": parts["client_secret"]}
              return _cache[name]

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def make_state(jwt_secret):
              ts = hex(int(time.time()))[2:]
              sig = hmac.new(jwt_secret.encode(), ts.encode(), hashlib.sha256).hexdigest()[:32]
              return f"{ts}.{sig}"

          def handler(event, context):
              provider = event.get("pathParameters", {}).get("provider", "")
              if provider not in PROVIDERS:
                  return {"statusCode": 400, "body": json.dumps({"error": "Unknown provider"})}

              cfg = PROVIDERS[provider]
              creds = get_secret(cfg["secret_name"])
              jwt_secret = get_jwt_secret()

              domain = event["requestContext"]["domainName"]
              redirect_uri = f"https://{domain}/auth/oauth/{provider}/callback"

              state = make_state(jwt_secret)

              params = {
                  "client_id": creds["client_id"],
                  "redirect_uri": redirect_uri,
                  "response_type": "code",
                  "scope": cfg["scope"],
                  "state": state,
              }
              if provider == "google":
                  params["access_type"] = "offline"
                  params["prompt"] = "consent"
              elif provider == "discord":
                  params["prompt"] = "consent"

              url = f"{cfg['auth_url']}?{urllib.parse.urlencode(params)}"

              return {
                  "statusCode": 302,
                  "headers": {"Location": url},
              }

  # --- Lambda: OAuth Callback (exchange code, create/link user) ---
  OAuthCallbackFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-oauth-callback
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SUBSCRIPTIONS_TABLE: !Ref SubscriptionsTable
          SITE_DOMAIN: !Ref SiteDomain
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
      Code:
        ZipFile: |
          import json
          import os
          import uuid
          import hashlib
          import hmac
          import base64
          import time
          import urllib.request
          import urllib.parse
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
          subs = boto3.resource("dynamodb").Table(os.environ["SUBSCRIPTIONS_TABLE"])
          site = os.environ["SITE_DOMAIN"]

          PROVIDERS = {
              "google": {
                  "secret_name": "allbyte-studio/google-oauth",
                  "token_url": "https://oauth2.googleapis.com/token",
                  "userinfo_url": "https://www.googleapis.com/oauth2/v2/userinfo",
              },
              "discord": {
                  "secret_name": "allbyte-studio/discord-oauth",
                  "token_url": "https://discord.com/api/oauth2/token",
                  "userinfo_url": "https://discord.com/api/users/@me",
              },
          }

          def get_secret(name):
              if name not in _cache:
                  sm = boto3.client("secretsmanager")
                  raw = sm.get_secret_value(SecretId=name)["SecretString"].strip().strip("{}")
                  parts = {}
                  for pair in raw.split(","):
                      key, _, value = pair.partition(":")
                      parts[key.strip()] = value.strip()
                  _cache[name] = {"client_id": parts["client_id"], "client_secret": parts["client_secret"]}
              return _cache[name]

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_state(state, jwt_secret):
              parts = state.split(".")
              if len(parts) != 2:
                  return False
              ts_hex, sig = parts
              expected = hmac.new(jwt_secret.encode(), ts_hex.encode(), hashlib.sha256).hexdigest()[:32]
              if not hmac.compare_digest(sig, expected):
                  return False
              ts = int(ts_hex, 16)
              if abs(time.time() - ts) > 600:
                  return False
              return True

          def sign_jwt(payload, secret):
              header = base64.urlsafe_b64encode(json.dumps({"alg": "HS256", "typ": "JWT"}).encode()).rstrip(b"=").decode()
              body = base64.urlsafe_b64encode(json.dumps(payload).encode()).rstrip(b"=").decode()
              sig_input = f"{header}.{body}"
              sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              return f"{header}.{body}.{sig}"

          def http_post_form(url, data, headers=None):
              body = urllib.parse.urlencode(data).encode()
              req = urllib.request.Request(url, data=body, method="POST")
              req.add_header("Content-Type", "application/x-www-form-urlencoded")
              if headers:
                  for k, v in headers.items():
                      req.add_header(k, v)
              resp = urllib.request.urlopen(req)
              return json.loads(resp.read())

          def http_get_json(url, token):
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"Bearer {token}")
              resp = urllib.request.urlopen(req)
              return json.loads(resp.read())

          def get_tier(stripe_customer_id):
              if not stripe_customer_id:
                  return None
              price_to_tier = {
                  os.environ["PRICE_INITIATE"]: "initiate",
                  os.environ["PRICE_HERO"]: "hero",
                  os.environ["PRICE_LEGEND"]: "legend",
              }
              try:
                  resp = subs.get_item(Key={"customerId": stripe_customer_id})
                  item = resp.get("Item", {})
                  if item.get("status") == "active":
                      return price_to_tier.get(item.get("priceId"))
              except Exception:
                  pass
              return None

          def redirect_error(msg):
              return {"statusCode": 302, "headers": {"Location": f"{site}/#auth_error={urllib.parse.quote(msg)}"}}

          def handler(event, context):
              provider = event.get("pathParameters", {}).get("provider", "")
              if provider not in PROVIDERS:
                  return redirect_error("Unknown provider")

              qs = event.get("queryStringParameters") or {}
              code = qs.get("code")
              state = qs.get("state", "")

              if not code:
                  error_desc = qs.get("error_description", qs.get("error", "Authorization denied"))
                  return redirect_error(error_desc)

              jwt_secret = get_jwt_secret()
              if not verify_state(state, jwt_secret):
                  return redirect_error("Invalid state parameter")

              cfg = PROVIDERS[provider]
              creds = get_secret(cfg["secret_name"])
              domain = event["requestContext"]["domainName"]
              redirect_uri = f"https://{domain}/auth/oauth/{provider}/callback"

              # Exchange code for access token
              try:
                  token_data = http_post_form(cfg["token_url"], {
                      "client_id": creds["client_id"],
                      "client_secret": creds["client_secret"],
                      "code": code,
                      "redirect_uri": redirect_uri,
                      "grant_type": "authorization_code",
                  })
              except Exception as e:
                  return redirect_error(f"Token exchange failed: {e}")

              access_token = token_data.get("access_token")
              if not access_token:
                  return redirect_error("No access token received")

              # Fetch user profile
              try:
                  profile = http_get_json(cfg["userinfo_url"], access_token)
              except Exception as e:
                  return redirect_error(f"Failed to fetch profile: {e}")

              # Extract email and name
              if provider == "google":
                  email = profile.get("email", "").strip().lower()
                  display_name = profile.get("name", email.split("@")[0])
                  oauth_id = profile.get("id", "")
              elif provider == "discord":
                  email = profile.get("email", "").strip().lower()
                  if not profile.get("verified", False):
                      return redirect_error("Discord email not verified")
                  display_name = profile.get("global_name") or profile.get("username", "")
                  oauth_id = profile.get("id", "")

              if not email:
                  return redirect_error("No email provided by provider")

              # Find or create user
              resp = users.query(
                  IndexName="email-index",
                  KeyConditionExpression="email = :e",
                  ExpressionAttributeValues={":e": email},
              )
              items = resp.get("Items", [])

              if items:
                  user = items[0]
                  # Link OAuth to existing account
                  users.update_item(
                      Key={"userId": user["userId"]},
                      UpdateExpression="SET oauthProvider = :p, oauthId = :oid",
                      ExpressionAttributeValues={":p": provider, ":oid": oauth_id},
                  )
              else:
                  user_id = str(uuid.uuid4())
                  now = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
                  user = {
                      "userId": user_id,
                      "email": email,
                      "username": display_name,
                      "oauthProvider": provider,
                      "oauthId": oauth_id,
                      "createdAt": now,
                  }
                  users.put_item(Item=user)

              tier = get_tier(user.get("stripeCustomerId"))
              token = sign_jwt({
                  "sub": user["userId"],
                  "email": user["email"],
                  "username": user.get("username", ""),
                  "exp": int(time.time()) + 7 * 86400,
              }, jwt_secret)

              return {
                  "statusCode": 302,
                  "headers": {"Location": f"{site}/#token={token}"},
              }

  # --- Lambda: Create Checkout Session ---
  CreateCheckoutFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-create-checkout
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          STRIPE_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:allbyte-studio/stripe-secret-key"
          SITE_DOMAIN: !Ref SiteDomain
          USERS_TABLE: !Ref UsersTable
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
          PRICE_DONATE_5: !Ref StripePriceDonate5
          PRICE_DONATE_10: !Ref StripePriceDonate10
          PRICE_DONATE_25: !Ref StripePriceDonate25
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import urllib.request
          import urllib.parse
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "POST,OPTIONS",
          }

          _cache = {}

          def get_stripe_key():
              if "stripe" not in _cache:
                  sm = boto3.client("secretsmanager")
                  resp = sm.list_secrets(Filters=[{"Key": "name", "Values": ["allbyte-studio/stripe-secret-key"]}])
                  secret_arn = resp["SecretList"][0]["ARN"]
                  _cache["stripe"] = sm.get_secret_value(SecretId=secret_arn)["SecretString"]
              return _cache["stripe"]
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_jwt(token, secret):
              parts = token.split(".")
              if len(parts) != 3:
                  return None
              sig_input = f"{parts[0]}.{parts[1]}"
              expected_sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              if not hmac.compare_digest(parts[2], expected_sig):
                  return None
              payload_b64 = parts[1] + "=" * (4 - len(parts[1]) % 4)
              payload = json.loads(base64.urlsafe_b64decode(payload_b64))
              if payload.get("exp", 0) < time.time():
                  return None
              return payload

          def stripe_post(path, data, api_key):
              body = urllib.parse.urlencode(data, doseq=True).encode()
              req = urllib.request.Request(
                  f"https://api.stripe.com/v1/{path}",
                  data=body,
                  headers={"Authorization": f"Bearer {api_key}"},
                  method="POST",
              )
              resp = urllib.request.urlopen(req)
              return json.loads(resp.read())

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              body = json.loads(event.get("body", "{}"))
              tier = body.get("tier")
              domain = os.environ["SITE_DOMAIN"]
              api_key = get_stripe_key()

              price_map = {
                  "initiate": os.environ["PRICE_INITIATE"],
                  "hero": os.environ["PRICE_HERO"],
                  "legend": os.environ["PRICE_LEGEND"],
                  "donate_5": os.environ["PRICE_DONATE_5"],
                  "donate_10": os.environ["PRICE_DONATE_10"],
                  "donate_25": os.environ["PRICE_DONATE_25"],
              }

              price_id = price_map.get(tier)
              if not price_id:
                  return err(400, f"Unknown tier: {tier}")

              is_subscription = tier in ("initiate", "hero", "legend")

              # For subscriptions, require auth and link to Stripe customer
              stripe_customer_id = None
              if is_subscription:
                  auth = event.get("headers", {}).get("authorization", "")
                  if not auth.startswith("Bearer "):
                      return err(401, "Login required for subscriptions")
                  jwt_secret = get_jwt_secret()
                  payload = verify_jwt(auth[7:], jwt_secret)
                  if not payload:
                      return err(401, "Invalid or expired token")

                  # Get or create Stripe customer
                  user_resp = users.get_item(Key={"userId": payload["sub"]})
                  user = user_resp.get("Item")
                  if not user:
                      return err(401, "User not found")

                  stripe_customer_id = user.get("stripeCustomerId")
                  if not stripe_customer_id:
                      customer = stripe_post("customers", {
                          "email": user["email"],
                          "metadata[userId]": user["userId"],
                      }, api_key)
                      stripe_customer_id = customer["id"]
                      users.update_item(
                          Key={"userId": user["userId"]},
                          UpdateExpression="SET stripeCustomerId = :c",
                          ExpressionAttributeValues={":c": stripe_customer_id},
                      )

              params = {
                  "line_items[0][price]": price_id,
                  "line_items[0][quantity]": "1",
                  "mode": "subscription" if is_subscription else "payment",
                  "success_url": f"{domain}/subscribe/?success=true",
                  "cancel_url": f"{domain}/subscribe/",
              }

              if stripe_customer_id:
                  params["customer"] = stripe_customer_id

              session = stripe_post("checkout/sessions", params, api_key)
              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({"url": session["url"]}),
              }

  # --- Lambda: Stripe Webhook ---
  WebhookFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-stripe-webhook
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref SubscriptionsTable
          STRIPE_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:allbyte-studio/stripe-secret-key"
      Code:
        ZipFile: |
          import json
          import os
          import hmac
          import hashlib
          import time
          import boto3

          table = boto3.resource("dynamodb").Table(os.environ["TABLE_NAME"])
          _webhook_secret_cache = {}

          def get_webhook_secret():
              if "key" not in _webhook_secret_cache:
                  sm = boto3.client("secretsmanager")
                  _webhook_secret_cache["key"] = sm.get_secret_value(
                      SecretId="allbyte-studio/stripe-webhook-secret"
                  )["SecretString"]
              return _webhook_secret_cache["key"]

          def verify_stripe_signature(payload, sig_header, secret):
              pairs = dict(p.split("=", 1) for p in sig_header.split(",") if "=" in p)
              timestamp = pairs.get("t", "")
              expected_sig = pairs.get("v1", "")
              if not timestamp or not expected_sig:
                  return False
              # Reject events older than 5 minutes
              if abs(time.time() - int(timestamp)) > 300:
                  return False
              signed_payload = f"{timestamp}.{payload}"
              computed = hmac.new(
                  secret.encode(), signed_payload.encode(), hashlib.sha256
              ).hexdigest()
              return hmac.compare_digest(computed, expected_sig)

          def handler(event, context):
              raw_body = event.get("body", "")
              sig_header = event.get("headers", {}).get("stripe-signature", "")

              webhook_secret = get_webhook_secret()
              if not verify_stripe_signature(raw_body, sig_header, webhook_secret):
                  return {"statusCode": 400, "body": "Invalid signature"}

              body = json.loads(raw_body)
              event_type = body.get("type", "")
              obj = body.get("data", {}).get("object", {})

              if event_type == "checkout.session.completed":
                  customer_id = obj.get("customer")
                  subscription_id = obj.get("subscription")
                  mode = obj.get("mode")

                  if mode == "subscription" and customer_id and subscription_id:
                      table.put_item(Item={
                          "customerId": customer_id,
                          "subscriptionId": subscription_id,
                          "status": "active",
                          "email": obj.get("customer_details", {}).get("email", ""),
                      })

                  elif mode == "payment":
                      table.put_item(Item={
                          "customerId": obj.get("payment_intent", "donation_" + context.aws_request_id),
                          "type": "donation",
                          "amount": obj.get("amount_total", 0),
                          "status": "completed",
                          "email": obj.get("customer_details", {}).get("email", ""),
                      })

              elif event_type in ("customer.subscription.updated", "customer.subscription.deleted"):
                  customer_id = obj.get("customer")
                  status = obj.get("status", "")
                  price_id = ""
                  items = obj.get("items", {}).get("data", [])
                  if items:
                      price_id = items[0].get("price", {}).get("id", "")

                  if customer_id:
                      table.update_item(
                          Key={"customerId": customer_id},
                          UpdateExpression="SET #s = :s, priceId = :p",
                          ExpressionAttributeNames={"#s": "status"},
                          ExpressionAttributeValues={
                              ":s": status,
                              ":p": price_id,
                          },
                      )

              return {"statusCode": 200, "body": "ok"}

  # --- Lambda: Get Subscriber Counts ---
  GetCountsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-get-counts
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref SubscriptionsTable
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
      Code:
        ZipFile: |
          import json
          import os
          import boto3

          CORS = {
              "Access-Control-Allow-Origin": "*",
              "Access-Control-Allow-Headers": "Content-Type",
              "Access-Control-Allow-Methods": "GET,OPTIONS",
          }

          table = boto3.resource("dynamodb").Table(os.environ["TABLE_NAME"])

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              price_to_tier = {
                  os.environ["PRICE_INITIATE"]: "initiate",
                  os.environ["PRICE_HERO"]: "hero",
                  os.environ["PRICE_LEGEND"]: "legend",
              }

              counts = {"initiate": 0, "hero": 0, "legend": 0}

              resp = table.scan(
                  FilterExpression="#s = :active AND attribute_exists(priceId)",
                  ExpressionAttributeNames={"#s": "status"},
                  ExpressionAttributeValues={":active": "active"},
              )

              for item in resp.get("Items", []):
                  tier = price_to_tier.get(item.get("priceId", ""))
                  if tier:
                      counts[tier] += 1

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps(counts),
              }

