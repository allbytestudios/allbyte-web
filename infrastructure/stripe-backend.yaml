AWSTemplateFormatVersion: "2010-09-09"
Description: AllByte Studios backend (Auth + Stripe + API Gateway + Lambda + DynamoDB)

Parameters:
  StripePriceInitiate:
    Type: String
    Default: price_1TJfoPL0A07AB3XunnJwtSwi
  StripePriceHero:
    Type: String
    Default: price_1TJfoQL0A07AB3XuczyqJc99
  StripePriceLegend:
    Type: String
    Default: price_1TJfoQL0A07AB3Xu9WXvyUvs
  StripePriceDonate5:
    Type: String
    Default: price_1TJfoRL0A07AB3XuzHlal9l6
  StripePriceDonate10:
    Type: String
    Default: price_1TJfoRL0A07AB3XulyU6BbL0
  StripePriceDonate25:
    Type: String
    Default: price_1TJfoSL0A07AB3XuKo0Mea0w
  SiteDomain:
    Type: String
    Default: https://allbyte.studio
  FromEmail:
    Type: String
    Default: notifications@allbyte.studio
  InitialAdminEmail:
    Type: String
    Default: allbytestudios@gmail.com
    Description: Email of the user to auto-promote to admin tier on next /auth/me call. One-time bootstrap; idempotent.

Resources:
  # --- DynamoDB Tables ---
  SubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: allbyte-studio-subscriptions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customerId
          AttributeType: S
      KeySchema:
        - AttributeName: customerId
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: allbyte-studio-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: stripeCustomerId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: stripeCustomerId-index
          KeySchema:
            - AttributeName: stripeCustomerId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # --- S3 Bucket: Game Pack Storage (private, never public) ---
  # Holds zone packs (Core.pck, LariaVillage.pck, etc.) downloaded by the
  # game client via short-lived signed URLs minted by GetPckUrlFunction.
  # Versioning enabled so a new pack upload doesn't break in-flight sessions.
  PacksBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: allbyte-studio-packs
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOldVersions
            Status: Enabled
            NoncurrentVersionTransitions:
              - TransitionInDays: 30
                StorageClass: GLACIER
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET]
            AllowedOrigins:
              - !Ref SiteDomain
              - "http://localhost:4321"
              - "http://localhost:4322"
            AllowedHeaders: ["*"]
            MaxAge: 3600

  # --- IAM Role for Lambdas ---
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: allbyte-studio-stripe-lambda
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BackendPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !GetAtt SubscriptionsTable.Arn
                  - !GetAtt UsersTable.Arn
                  - !Sub "${UsersTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:ListSecrets
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:allbyte-studio/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource:
                  - !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/allbyte.studio"
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::allbyte-studio-packs/*"

  # --- Lambda: Auth Signup ---
  SignupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-auth-signup
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SITE_DOMAIN: !Ref SiteDomain
      Code:
        ZipFile: |
          import json
          import os
          import uuid
          import hashlib
          import hmac
          import base64
          import time
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "POST,OPTIONS",
          }

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def hash_password(password, salt=None):
              if salt is None:
                  salt = os.urandom(32)
              dk = hashlib.pbkdf2_hmac("sha256", password.encode(), salt, 600000)
              return base64.b64encode(salt).decode() + ":" + base64.b64encode(dk).decode()

          def sign_jwt(payload, secret):
              header = base64.urlsafe_b64encode(json.dumps({"alg": "HS256", "typ": "JWT"}).encode()).rstrip(b"=").decode()
              body = base64.urlsafe_b64encode(json.dumps(payload).encode()).rstrip(b"=").decode()
              sig_input = f"{header}.{body}"
              sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              return f"{header}.{body}.{sig}"

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              body = json.loads(event.get("body", "{}"))
              email = body.get("email", "").strip().lower()
              password = body.get("password", "")
              username = body.get("username", "").strip()

              if not email or "@" not in email:
                  return err(400, "Valid email required")
              if len(password) < 8:
                  return err(400, "Password must be at least 8 characters")
              if not username:
                  return err(400, "Username required")

              # Check if email already exists
              resp = users.query(
                  IndexName="email-index",
                  KeyConditionExpression="email = :e",
                  ExpressionAttributeValues={":e": email},
              )
              if resp.get("Items"):
                  return err(409, "Email already registered")

              user_id = str(uuid.uuid4())
              pw_hash = hash_password(password)
              now = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

              users.put_item(Item={
                  "userId": user_id,
                  "email": email,
                  "username": username,
                  "passwordHash": pw_hash,
                  "createdAt": now,
                  "tier": "default",
              })

              jwt_secret = get_jwt_secret()
              token = sign_jwt({
                  "sub": user_id,
                  "email": email,
                  "username": username,
                  "exp": int(time.time()) + 7 * 86400,
              }, jwt_secret)

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({
                      "token": token,
                      "user": {"userId": user_id, "email": email, "username": username},
                  }),
              }

  # --- Lambda: Auth Login ---
  LoginFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-auth-login
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SUBSCRIPTIONS_TABLE: !Ref SubscriptionsTable
          SITE_DOMAIN: !Ref SiteDomain
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
          INITIAL_ADMIN_EMAIL: !Ref InitialAdminEmail
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
          subs = boto3.resource("dynamodb").Table(os.environ["SUBSCRIPTIONS_TABLE"])

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "POST,OPTIONS",
          }

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_password(password, stored):
              salt_b64, hash_b64 = stored.split(":")
              salt = base64.b64decode(salt_b64)
              expected = base64.b64decode(hash_b64)
              dk = hashlib.pbkdf2_hmac("sha256", password.encode(), salt, 600000)
              return hmac.compare_digest(dk, expected)

          def sign_jwt(payload, secret):
              header = base64.urlsafe_b64encode(json.dumps({"alg": "HS256", "typ": "JWT"}).encode()).rstrip(b"=").decode()
              body = base64.urlsafe_b64encode(json.dumps(payload).encode()).rstrip(b"=").decode()
              sig_input = f"{header}.{body}"
              sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              return f"{header}.{body}.{sig}"

          INITIAL_ADMIN_EMAIL = os.environ.get("INITIAL_ADMIN_EMAIL", "").strip().lower()
          VALID_TIERS = {"default", "initiate", "hero", "legend", "admin"}

          def compute_tier_from_subscription(stripe_customer_id):
              if not stripe_customer_id:
                  return "default"
              price_to_tier = {
                  os.environ["PRICE_INITIATE"]: "initiate",
                  os.environ["PRICE_HERO"]: "hero",
                  os.environ["PRICE_LEGEND"]: "legend",
              }
              try:
                  resp = subs.get_item(Key={"customerId": stripe_customer_id})
                  item = resp.get("Item", {})
                  if item.get("status") == "active":
                      return price_to_tier.get(item.get("priceId"), "default")
              except Exception:
                  pass
              return "default"

          def resolve_tier(user):
              user_id = user["userId"]
              email = (user.get("email") or "").strip().lower()
              stored = user.get("tier")
              if stored not in VALID_TIERS:
                  computed = compute_tier_from_subscription(user.get("stripeCustomerId"))
                  try:
                      users.update_item(
                          Key={"userId": user_id},
                          UpdateExpression="SET #t = :t",
                          ExpressionAttributeNames={"#t": "tier"},
                          ExpressionAttributeValues={":t": computed},
                      )
                  except Exception:
                      pass
                  stored = computed
              if (
                  INITIAL_ADMIN_EMAIL
                  and email == INITIAL_ADMIN_EMAIL
                  and stored != "admin"
              ):
                  try:
                      users.update_item(
                          Key={"userId": user_id},
                          UpdateExpression="SET #t = :t",
                          ExpressionAttributeNames={"#t": "tier"},
                          ExpressionAttributeValues={":t": "admin"},
                      )
                      stored = "admin"
                  except Exception:
                      pass
              return stored

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              body = json.loads(event.get("body", "{}"))
              email = body.get("email", "").strip().lower()
              password = body.get("password", "")

              if not email or not password:
                  return err(400, "Email and password required")

              resp = users.query(
                  IndexName="email-index",
                  KeyConditionExpression="email = :e",
                  ExpressionAttributeValues={":e": email},
              )
              items = resp.get("Items", [])
              if not items:
                  return err(401, "Invalid email or password")

              user = items[0]
              if not verify_password(password, user["passwordHash"]):
                  return err(401, "Invalid email or password")

              tier = resolve_tier(user)
              jwt_secret = get_jwt_secret()
              token = sign_jwt({
                  "sub": user["userId"],
                  "email": user["email"],
                  "username": user["username"],
                  "exp": int(time.time()) + 7 * 86400,
              }, jwt_secret)

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({
                      "token": token,
                      "user": {
                          "userId": user["userId"],
                          "email": user["email"],
                          "username": user["username"],
                          "tier": tier,
                          "stripeCustomerId": user.get("stripeCustomerId"),
                      },
                  }),
              }

  # --- Lambda: Auth Me (verify token, get profile) ---
  MeFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-auth-me
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SUBSCRIPTIONS_TABLE: !Ref SubscriptionsTable
          SITE_DOMAIN: !Ref SiteDomain
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
          INITIAL_ADMIN_EMAIL: !Ref InitialAdminEmail
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
          subs = boto3.resource("dynamodb").Table(os.environ["SUBSCRIPTIONS_TABLE"])
          INITIAL_ADMIN_EMAIL = os.environ.get("INITIAL_ADMIN_EMAIL", "").strip().lower()
          VALID_TIERS = {"default", "initiate", "hero", "legend", "admin"}

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "GET,OPTIONS",
          }

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_jwt(token, secret):
              parts = token.split(".")
              if len(parts) != 3:
                  return None
              sig_input = f"{parts[0]}.{parts[1]}"
              expected_sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              if not hmac.compare_digest(parts[2], expected_sig):
                  return None
              # Decode payload (add padding)
              payload_b64 = parts[1] + "=" * (4 - len(parts[1]) % 4)
              payload = json.loads(base64.urlsafe_b64decode(payload_b64))
              if payload.get("exp", 0) < time.time():
                  return None
              return payload

          def compute_tier_from_subscription(stripe_customer_id):
              """Legacy fallback: compute tier by joining SubscriptionsTable."""
              if not stripe_customer_id:
                  return "default"
              price_to_tier = {
                  os.environ["PRICE_INITIATE"]: "initiate",
                  os.environ["PRICE_HERO"]: "hero",
                  os.environ["PRICE_LEGEND"]: "legend",
              }
              try:
                  resp = subs.get_item(Key={"customerId": stripe_customer_id})
                  item = resp.get("Item", {})
                  if item.get("status") == "active":
                      return price_to_tier.get(item.get("priceId"), "default")
              except Exception:
                  pass
              return "default"

          def resolve_tier(user):
              """Source-of-truth tier read with read-through migration + admin
              bootstrap. Returns the canonical tier string (one of VALID_TIERS).
              Writes back to UsersTable when migrating or promoting."""
              user_id = user["userId"]
              email = (user.get("email") or "").strip().lower()
              stored = user.get("tier")

              # Step 1: read-through migration. If no tier on the record yet,
              # compute from the legacy Stripe subscription join and write back.
              if stored not in VALID_TIERS:
                  computed = compute_tier_from_subscription(user.get("stripeCustomerId"))
                  try:
                      users.update_item(
                          Key={"userId": user_id},
                          UpdateExpression="SET #t = :t",
                          ExpressionAttributeNames={"#t": "tier"},
                          ExpressionAttributeValues={":t": computed},
                      )
                  except Exception:
                      pass
                  stored = computed

              # Step 2: admin bootstrap. If this user matches the seed email,
              # promote to admin (idempotent — no-op when already admin).
              if (
                  INITIAL_ADMIN_EMAIL
                  and email == INITIAL_ADMIN_EMAIL
                  and stored != "admin"
              ):
                  try:
                      users.update_item(
                          Key={"userId": user_id},
                          UpdateExpression="SET #t = :t",
                          ExpressionAttributeNames={"#t": "tier"},
                          ExpressionAttributeValues={":t": "admin"},
                      )
                      stored = "admin"
                  except Exception:
                      pass

              return stored

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              auth = event.get("headers", {}).get("authorization", "")
              if not auth.startswith("Bearer "):
                  return err(401, "No token provided")

              token = auth[7:]
              jwt_secret = get_jwt_secret()
              payload = verify_jwt(token, jwt_secret)
              if not payload:
                  return err(401, "Invalid or expired token")

              resp = users.get_item(Key={"userId": payload["sub"]})
              user = resp.get("Item")
              if not user:
                  return err(401, "User not found")

              tier = resolve_tier(user)

              prefs = user.get("notificationPreferences")
              if prefs:
                  prefs = {k: bool(v) for k, v in prefs.items()}

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({
                      "user": {
                          "userId": user["userId"],
                          "email": user["email"],
                          "username": user["username"],
                          "tier": tier,
                          "stripeCustomerId": user.get("stripeCustomerId"),
                          "notificationPreferences": prefs,
                      },
                  }),
              }

  # --- Lambda: Notification Preferences ---
  NotificationPrefsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-notification-prefs
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SITE_DOMAIN: !Ref SiteDomain
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "PUT,OPTIONS",
          }

          VALID_KEYS = {"chronicles", "godot-and-claude", "studio", "music", "artwork", "fonts"}

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_jwt(token, secret):
              parts = token.split(".")
              if len(parts) != 3:
                  return None
              sig_input = f"{parts[0]}.{parts[1]}"
              expected_sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              if not hmac.compare_digest(parts[2], expected_sig):
                  return None
              payload_b64 = parts[1] + "=" * (4 - len(parts[1]) % 4)
              payload = json.loads(base64.urlsafe_b64decode(payload_b64))
              if payload.get("exp", 0) < time.time():
                  return None
              return payload

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              auth = event.get("headers", {}).get("authorization", "")
              if not auth.startswith("Bearer "):
                  return err(401, "Login required")

              payload = verify_jwt(auth[7:], get_jwt_secret())
              if not payload:
                  return err(401, "Invalid or expired token")

              user_id = payload["sub"]

              body = json.loads(event.get("body", "{}"))
              preferences = body.get("preferences")

              if preferences is None:
                  users.update_item(
                      Key={"userId": user_id},
                      UpdateExpression="REMOVE notificationPreferences",
                  )
                  return {
                      "statusCode": 200,
                      "headers": CORS,
                      "body": json.dumps({"preferences": None}),
                  }

              if not isinstance(preferences, dict):
                  return err(400, "preferences must be an object or null")
              if set(preferences.keys()) != VALID_KEYS:
                  return err(400, f"preferences must contain exactly: {', '.join(sorted(VALID_KEYS))}")
              if not all(isinstance(v, bool) for v in preferences.values()):
                  return err(400, "All preference values must be boolean")

              users.update_item(
                  Key={"userId": user_id},
                  UpdateExpression="SET notificationPreferences = :p",
                  ExpressionAttributeValues={":p": preferences},
              )

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({"preferences": preferences}),
              }

  # --- Lambda: Save Sync (Hero/Legend tier game saves) ---
  SaveSyncFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-save-sync
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SUBSCRIPTIONS_TABLE: !Ref SubscriptionsTable
          SITE_DOMAIN: !Ref SiteDomain
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import datetime
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
          subs = boto3.resource("dynamodb").Table(os.environ["SUBSCRIPTIONS_TABLE"])

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "GET,PUT,DELETE,OPTIONS",
          }

          MAX_SAVE_BYTES = 250 * 1024  # 250KB

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_jwt(token, secret):
              parts = token.split(".")
              if len(parts) != 3:
                  return None
              sig_input = f"{parts[0]}.{parts[1]}"
              expected_sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              if not hmac.compare_digest(parts[2], expected_sig):
                  return None
              payload_b64 = parts[1] + "=" * (4 - len(parts[1]) % 4)
              payload = json.loads(base64.urlsafe_b64decode(payload_b64))
              if payload.get("exp", 0) < time.time():
                  return None
              return payload

          def get_tier(stripe_customer_id):
              if not stripe_customer_id:
                  return None
              price_to_tier = {
                  os.environ["PRICE_INITIATE"]: "initiate",
                  os.environ["PRICE_HERO"]: "hero",
                  os.environ["PRICE_LEGEND"]: "legend",
              }
              try:
                  resp = subs.get_item(Key={"customerId": stripe_customer_id})
                  item = resp.get("Item", {})
                  if item.get("status") == "active":
                      return price_to_tier.get(item.get("priceId"))
              except Exception:
                  pass
              return None

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              method = event.get("requestContext", {}).get("http", {}).get("method", "")
              if method == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              auth = event.get("headers", {}).get("authorization", "")
              if not auth.startswith("Bearer "):
                  return err(401, "Login required")

              payload = verify_jwt(auth[7:], get_jwt_secret())
              if not payload:
                  return err(401, "Invalid or expired token")

              user_id = payload["sub"]

              # Look up user to check tier
              user_resp = users.get_item(Key={"userId": user_id})
              user = user_resp.get("Item")
              if not user:
                  return err(401, "User not found")

              tier = get_tier(user.get("stripeCustomerId"))
              if tier not in ("hero", "legend"):
                  return err(403, "Save sync requires a Hero or Legend subscription")

              if method == "GET":
                  save_data = user.get("saveData")
                  if not save_data:
                      return {
                          "statusCode": 404,
                          "headers": CORS,
                          "body": json.dumps({"error": "No saved data"}),
                      }
                  return {
                      "statusCode": 200,
                      "headers": CORS,
                      "body": json.dumps({
                          "saves": save_data,
                          "updatedAt": user.get("saveDataUpdatedAt"),
                      }),
                  }

              if method == "PUT":
                  body = json.loads(event.get("body", "{}"))
                  saves_blob = body.get("saves")
                  if not isinstance(saves_blob, str):
                      return err(400, "saves must be a JSON-encoded string")
                  if len(saves_blob.encode("utf-8")) > MAX_SAVE_BYTES:
                      return err(413, f"Save data exceeds maximum size of {MAX_SAVE_BYTES} bytes")
                  # Validate it parses as JSON (don't validate schema)
                  try:
                      json.loads(saves_blob)
                  except Exception:
                      return err(400, "saves must be valid JSON")

                  now = datetime.datetime.utcnow().isoformat() + "Z"
                  users.update_item(
                      Key={"userId": user_id},
                      UpdateExpression="SET saveData = :s, saveDataUpdatedAt = :t",
                      ExpressionAttributeValues={":s": saves_blob, ":t": now},
                  )
                  return {
                      "statusCode": 200,
                      "headers": CORS,
                      "body": json.dumps({"updatedAt": now}),
                  }

              if method == "DELETE":
                  users.update_item(
                      Key={"userId": user_id},
                      UpdateExpression="REMOVE saveData, saveDataUpdatedAt",
                  )
                  return {
                      "statusCode": 200,
                      "headers": CORS,
                      "body": json.dumps({"deleted": True}),
                  }

              return err(405, f"Method {method} not allowed")

