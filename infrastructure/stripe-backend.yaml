    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt CreatePostFunction.Arn
      PayloadFormatVersion: "2.0"

  CreatePostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /legend/posts"
      Target: !Sub "integrations/${CreatePostIntegration}"

  CreatePostPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreatePostFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  ReplyPostIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ReplyPostFunction.Arn
      PayloadFormatVersion: "2.0"

  ReplyPostRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "PUT /legend/posts/{postId}/reply"
      Target: !Sub "integrations/${ReplyPostIntegration}"

  ReplyPostPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReplyPostFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

Outputs:
  ApiUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  UsersTableName:
    Value: !Ref UsersTable
  SubscriptionsTableName:
    Value: !Ref SubscriptionsTable
  WebhookUrl:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook"
  PckUrlEndpoint:
    Description: "Endpoint for PackLoader auth flow. GET with ?pack=<name>. Public packs need no auth; tiered packs need Bearer JWT."
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/pck-url"
  PacksBucketName:
    Description: "S3 bucket where .pck files live (private; access only via signed URLs)"
    Value: !Ref PacksBucket
