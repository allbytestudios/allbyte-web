                  return None
              sig_input = f"{parts[0]}.{parts[1]}"
              expected_sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              if not hmac.compare_digest(parts[2], expected_sig):
                  return None
              payload_b64 = parts[1] + "=" * (4 - len(parts[1]) % 4)
              payload = json.loads(base64.urlsafe_b64decode(payload_b64))
              if payload.get("exp", 0) < time.time():
                  return None
              return payload

          def stripe_post(path, data, api_key):
              body = urllib.parse.urlencode(data, doseq=True).encode()
              req = urllib.request.Request(
                  f"https://api.stripe.com/v1/{path}",
                  data=body,
                  headers={"Authorization": f"Bearer {api_key}"},
                  method="POST",
              )
              resp = urllib.request.urlopen(req)
              return json.loads(resp.read())

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              body = json.loads(event.get("body", "{}"))
              tier = body.get("tier")
              domain = os.environ["SITE_DOMAIN"]
              api_key = get_stripe_key()

              price_map = {
                  "initiate": os.environ["PRICE_INITIATE"],
                  "hero": os.environ["PRICE_HERO"],
                  "legend": os.environ["PRICE_LEGEND"],
                  "donate_5": os.environ["PRICE_DONATE_5"],
                  "donate_10": os.environ["PRICE_DONATE_10"],
                  "donate_25": os.environ["PRICE_DONATE_25"],
              }

              price_id = price_map.get(tier)
              if not price_id:
                  return err(400, f"Unknown tier: {tier}")

              is_subscription = tier in ("initiate", "hero", "legend")

              # For subscriptions, require auth and link to Stripe customer
              stripe_customer_id = None
              if is_subscription:
                  auth = event.get("headers", {}).get("authorization", "")
                  if not auth.startswith("Bearer "):
                      return err(401, "Login required for subscriptions")
                  jwt_secret = get_jwt_secret()
                  payload = verify_jwt(auth[7:], jwt_secret)
                  if not payload:
                      return err(401, "Invalid or expired token")

                  # Get or create Stripe customer
                  user_resp = users.get_item(Key={"userId": payload["sub"]})
                  user = user_resp.get("Item")
                  if not user:
                      return err(401, "User not found")

                  stripe_customer_id = user.get("stripeCustomerId")
                  if not stripe_customer_id:
                      customer = stripe_post("customers", {
                          "email": user["email"],
                          "metadata[userId]": user["userId"],
                      }, api_key)
                      stripe_customer_id = customer["id"]
                      users.update_item(
                          Key={"userId": user["userId"]},
                          UpdateExpression="SET stripeCustomerId = :c",
                          ExpressionAttributeValues={":c": stripe_customer_id},
                      )

              params = {
                  "line_items[0][price]": price_id,
                  "line_items[0][quantity]": "1",
                  "mode": "subscription" if is_subscription else "payment",
                  "success_url": f"{domain}/subscribe/?success=true",
                  "cancel_url": f"{domain}/subscribe/",
              }

              if stripe_customer_id:
                  params["customer"] = stripe_customer_id

              session = stripe_post("checkout/sessions", params, api_key)
              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({"url": session["url"]}),
              }

  # --- Lambda: Stripe Webhook ---
  WebhookFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-stripe-webhook
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref SubscriptionsTable
          USERS_TABLE: !Ref UsersTable
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
          STRIPE_SECRET_ARN: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:allbyte-studio/stripe-secret-key"
      Code:
        ZipFile: |
          import json
          import os
          import hmac
          import hashlib
          import time
          import boto3

          table = boto3.resource("dynamodb").Table(os.environ["TABLE_NAME"])
          users_table = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
          _webhook_secret_cache = {}

          def tier_for(status, price_id):
              """Map (subscription status, priceId) to a tier name."""
              if status != "active":
                  return "default"
              price_to_tier = {
                  os.environ.get("PRICE_INITIATE", ""): "initiate",
                  os.environ.get("PRICE_HERO", ""): "hero",
                  os.environ.get("PRICE_LEGEND", ""): "legend",
              }
              return price_to_tier.get(price_id, "default")

          def update_user_tier_by_customer(customer_id, status, price_id):
              """Reverse-lookup the user from stripeCustomerId via the GSI and
              write the new tier to UsersTable. Idempotent — admin overrides
              that aren't tied to a Stripe customer survive (they're a
              different user). For users with an active subscription whose
              admin lowered them, the next webhook touching their customer
              clobbers the manual tier — documented behavior."""
              if not customer_id:
                  return
              try:
                  resp = users_table.query(
                      IndexName="stripeCustomerId-index",
                      KeyConditionExpression="stripeCustomerId = :c",
                      ExpressionAttributeValues={":c": customer_id},
                  )
                  for u in resp.get("Items", []):
                      # Don't clobber existing admins via subscription events.
                      if u.get("tier") == "admin":
                          continue
                      new_tier = tier_for(status, price_id)
                      users_table.update_item(
                          Key={"userId": u["userId"]},
                          UpdateExpression="SET #t = :t",
                          ExpressionAttributeNames={"#t": "tier"},
                          ExpressionAttributeValues={":t": new_tier},
                      )
              except Exception as e:
                  print(f"[webhook] failed to update user tier for {customer_id}: {e}")

          def get_webhook_secret():
              if "key" not in _webhook_secret_cache:
                  sm = boto3.client("secretsmanager")
                  _webhook_secret_cache["key"] = sm.get_secret_value(
                      SecretId="allbyte-studio/stripe-webhook-secret"
                  )["SecretString"]
              return _webhook_secret_cache["key"]

          def verify_stripe_signature(payload, sig_header, secret):
              pairs = dict(p.split("=", 1) for p in sig_header.split(",") if "=" in p)
              timestamp = pairs.get("t", "")
              expected_sig = pairs.get("v1", "")
              if not timestamp or not expected_sig:
                  return False
              # Reject events older than 5 minutes
              if abs(time.time() - int(timestamp)) > 300:
                  return False
              signed_payload = f"{timestamp}.{payload}"
              computed = hmac.new(
                  secret.encode(), signed_payload.encode(), hashlib.sha256
              ).hexdigest()
              return hmac.compare_digest(computed, expected_sig)

          def handler(event, context):
              raw_body = event.get("body", "")
              sig_header = event.get("headers", {}).get("stripe-signature", "")

              webhook_secret = get_webhook_secret()
              if not verify_stripe_signature(raw_body, sig_header, webhook_secret):
                  return {"statusCode": 400, "body": "Invalid signature"}

              body = json.loads(raw_body)
              event_type = body.get("type", "")
              obj = body.get("data", {}).get("object", {})

              if event_type == "checkout.session.completed":
                  customer_id = obj.get("customer")
                  subscription_id = obj.get("subscription")
                  mode = obj.get("mode")

                  if mode == "subscription" and customer_id and subscription_id:
                      item = {
                          "customerId": customer_id,
                          "subscriptionId": subscription_id,
                          "status": "active",
                          "email": obj.get("customer_details", {}).get("email", ""),
                      }
                      # Extract priceId from line items if available
                      line_items = obj.get("display_items") or []
                      if not line_items:
                          line_items = obj.get("line_items", {}).get("data", [])
                      price_id = ""
                      if line_items:
                          price = line_items[0].get("price", {})
                          if isinstance(price, dict):
                              price_id = price.get("id", "")
                          elif isinstance(price, str):
                              price_id = price
                          if price_id:
                              item["priceId"] = price_id
                      table.put_item(Item=item)
                      # Mirror the new tier into UsersTable so MeFunction can
                      # read it directly without joining SubscriptionsTable.
                      update_user_tier_by_customer(customer_id, "active", price_id)

                  elif mode == "payment":
                      table.put_item(Item={
                          "customerId": obj.get("payment_intent", "donation_" + context.aws_request_id),
                          "type": "donation",
                          "amount": obj.get("amount_total", 0),
                          "status": "completed",
                          "email": obj.get("customer_details", {}).get("email", ""),
                      })

              elif event_type in ("customer.subscription.updated", "customer.subscription.deleted"):
                  customer_id = obj.get("customer")
                  status = obj.get("status", "")
                  price_id = ""
                  items = obj.get("items", {}).get("data", [])
                  if items:
                      price_id = items[0].get("price", {}).get("id", "")

                  if customer_id:
                      table.update_item(
                          Key={"customerId": customer_id},
                          UpdateExpression="SET #s = :s, priceId = :p",
                          ExpressionAttributeNames={"#s": "status"},
                          ExpressionAttributeValues={
                              ":s": status,
                              ":p": price_id,
                          },
                      )
                      update_user_tier_by_customer(customer_id, status, price_id)

              return {"statusCode": 200, "body": "ok"}

  # --- Lambda: Get Subscriber Counts ---
  GetCountsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-get-counts
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          TABLE_NAME: !Ref SubscriptionsTable
          PRICE_INITIATE: !Ref StripePriceInitiate
          PRICE_HERO: !Ref StripePriceHero
          PRICE_LEGEND: !Ref StripePriceLegend
      Code:
        ZipFile: |
          import json
          import os
          import boto3

          CORS = {
              "Access-Control-Allow-Origin": "*",
              "Access-Control-Allow-Headers": "Content-Type",
              "Access-Control-Allow-Methods": "GET,OPTIONS",
          }

          table = boto3.resource("dynamodb").Table(os.environ["TABLE_NAME"])

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              price_to_tier = {
                  os.environ["PRICE_INITIATE"]: "initiate",
                  os.environ["PRICE_HERO"]: "hero",
                  os.environ["PRICE_LEGEND"]: "legend",
              }

              counts = {"initiate": 0, "hero": 0, "legend": 0}

              resp = table.scan(
                  FilterExpression="#s = :active AND attribute_exists(priceId)",
                  ExpressionAttributeNames={"#s": "status"},
                  ExpressionAttributeValues={":active": "active"},
              )

              for item in resp.get("Items", []):
                  tier = price_to_tier.get(item.get("priceId", ""))
                  if tier:
                      counts[tier] += 1

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps(counts),
              }

  # --- Lambda: Admin — list all users (admin tier only) ---
  AdminListUsersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-admin-list-users
      Runtime: python3.12
      Handler: index.handler
      Timeout: 15
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SITE_DOMAIN: !Ref SiteDomain
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "GET,OPTIONS",
          }

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_jwt(token, secret):
              parts = token.split(".")
              if len(parts) != 3:
                  return None
              sig_input = f"{parts[0]}.{parts[1]}"
              expected_sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              if not hmac.compare_digest(parts[2], expected_sig):
                  return None
              payload_b64 = parts[1] + "=" * (4 - len(parts[1]) % 4)
              payload = json.loads(base64.urlsafe_b64decode(payload_b64))
              if payload.get("exp", 0) < time.time():
                  return None
              return payload

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          # Sensitive fields stripped from the API response so the admin UI never
          # sees password hashes / oauth IDs.
          STRIP_FIELDS = {"passwordHash", "oauthId"}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              auth = event.get("headers", {}).get("authorization", "")
              if not auth.startswith("Bearer "):
                  return err(401, "No token provided")

              token = auth[7:]
              jwt_secret = get_jwt_secret()
              payload = verify_jwt(token, jwt_secret)
              if not payload:
                  return err(401, "Invalid or expired token")

              # Verify the calling user is an admin.
              actor_resp = users.get_item(Key={"userId": payload["sub"]})
              actor = actor_resp.get("Item")
              if not actor or actor.get("tier") != "admin":
                  return err(403, "Admin tier required")

              # Scan all users (small table — fine for now). Strip sensitive fields.
              try:
                  scan = users.scan()
                  items = scan.get("Items", [])
              except Exception as e:
                  return err(500, f"scan failed: {e}")

              cleaned = []
              for u in items:
                  out = {k: v for k, v in u.items() if k not in STRIP_FIELDS}
                  # Coerce DynamoDB Decimals etc to JSON-friendly types if needed
                  for k, v in list(out.items()):
                      if hasattr(v, "__int__") and not isinstance(v, (int, str, bool)):
                          out[k] = int(v)
                  cleaned.append(out)

              # Sort newest first (createdAt is ISO-8601, lexicographic sort works).
              cleaned.sort(key=lambda x: x.get("createdAt", ""), reverse=True)

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({"users": cleaned, "count": len(cleaned)}),
              }

  # --- Lambda: Admin — set a user's tier (admin tier only) ---
  AdminSetTierFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-admin-set-tier
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          SITE_DOMAIN: !Ref SiteDomain
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import boto3

          users = boto3.resource("dynamodb").Table(os.environ["USERS_TABLE"])
          VALID_TIERS = {"default", "initiate", "hero", "legend", "admin"}

          CORS = {
              "Access-Control-Allow-Origin": os.environ["SITE_DOMAIN"],
              "Access-Control-Allow-Headers": "Content-Type,Authorization",
              "Access-Control-Allow-Methods": "PUT,OPTIONS",
          }

          _cache = {}
          def get_jwt_secret():
              if "jwt" not in _cache:
                  sm = boto3.client("secretsmanager")
                  _cache["jwt"] = sm.get_secret_value(SecretId="allbyte-studio/jwt-secret")["SecretString"]
              return _cache["jwt"]

          def verify_jwt(token, secret):
              parts = token.split(".")
              if len(parts) != 3:
                  return None
              sig_input = f"{parts[0]}.{parts[1]}"
              expected_sig = base64.urlsafe_b64encode(
                  hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
              ).rstrip(b"=").decode()
              if not hmac.compare_digest(parts[2], expected_sig):
                  return None
              payload_b64 = parts[1] + "=" * (4 - len(parts[1]) % 4)
              payload = json.loads(base64.urlsafe_b64decode(payload_b64))
              if payload.get("exp", 0) < time.time():
                  return None
              return payload

          def err(code, msg):
              return {"statusCode": code, "headers": CORS, "body": json.dumps({"error": msg})}

          def handler(event, context):
              if event.get("requestContext", {}).get("http", {}).get("method") == "OPTIONS":
                  return {"statusCode": 200, "headers": CORS}

              auth = event.get("headers", {}).get("authorization", "")
              if not auth.startswith("Bearer "):
                  return err(401, "No token provided")

              token = auth[7:]
              jwt_secret = get_jwt_secret()
              payload = verify_jwt(token, jwt_secret)
              if not payload:
                  return err(401, "Invalid or expired token")

              # Admin assertion
              actor_id = payload["sub"]
              actor_resp = users.get_item(Key={"userId": actor_id})
              actor = actor_resp.get("Item")
              if not actor or actor.get("tier") != "admin":
                  return err(403, "Admin tier required")

              # Path param: userId
              path_params = event.get("pathParameters") or {}
              target_id = path_params.get("userId", "")
              if not target_id:
                  return err(400, "Missing userId path param")

              # Body: tier
              try:
                  body = json.loads(event.get("body", "{}") or "{}")
              except Exception:
                  return err(400, "Invalid JSON body")
              new_tier = body.get("tier", "")
              if new_tier not in VALID_TIERS:
                  return err(400, f"Invalid tier '{new_tier}'. Must be one of {sorted(VALID_TIERS)}")

              # Block self-demotion to prevent admin lockout. Admins can't change
              # their own tier — another admin must do it (or the InitialAdminEmail
              # bootstrap re-promotes on next /auth/me call).
              if target_id == actor_id and new_tier != "admin":
                  return err(409, "Admins cannot demote themselves. Have another admin do it.")

              # Verify target exists
              target_resp = users.get_item(Key={"userId": target_id})
              target = target_resp.get("Item")
              if not target:
                  return err(404, "Target user not found")

              old_tier = target.get("tier", "default")

              try:
                  users.update_item(
                      Key={"userId": target_id},
                      UpdateExpression="SET #t = :t",
                      ExpressionAttributeNames={"#t": "tier"},
                      ExpressionAttributeValues={":t": new_tier},
                  )
              except Exception as e:
                  return err(500, f"update failed: {e}")

              # CloudWatch audit line — picked up by Lambda's stdout log group.
              print(
                  f"[AUDIT] admin={actor_id} ({actor.get('email','')}) "
                  f"set userId={target_id} ({target.get('email','')}) "
                  f"tier={old_tier}->{new_tier}"
              )

              return {
                  "statusCode": 200,
                  "headers": CORS,
                  "body": json.dumps({
                      "userId": target_id,
                      "tier": new_tier,
                      "previousTier": old_tier,
                  }),
              }

  # --- Lambda: PCK signed-URL issuer ---
  # GET /pck-url?pack=<name>
  # For `public` packs (in PACK_TIER_REQUIREMENTS): no auth required, anyone
  # gets a 15-min signed URL. For tiered packs: JWT required, tier checked.
  GetPckUrlFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: allbyte-studio-pck-url
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          PACKS_BUCKET: !Ref PacksBucket
          SITE_DOMAIN: !Ref SiteDomain
          URL_TTL_SECONDS: "900"
      Code:
        ZipFile: |
          import json
          import os
          import hashlib
          import hmac
          import base64
          import time
          import re
          import boto3
          from botocore.config import Config

          # us-east-1 signature-v4 client, required for presigned URL generation
          s3 = boto3.client("s3", config=Config(signature_version="s3v4"))
          BUCKET = os.environ["PACKS_BUCKET"]
          TTL = int(os.environ.get("URL_TTL_SECONDS", "900"))
          SITE_DOMAIN = os.environ["SITE_DOMAIN"]

          # Tier ordering — index into list = user's entitlement rank.
          # Pack requires tier >= its declared requirement.
          TIER_ORDER = ["default", "initiate", "hero", "legend", "admin"]
          TIER_RANK = {t: i for i, t in enumerate(TIER_ORDER)}

          # Per-pack tier requirements. "public" means no auth needed at all.
          # Add new packs here as they ship; omitting a pack = 404.
          PACK_TIER_REQUIREMENTS = {
              "Core":         "public",
              "LariaVillage": "public",
              # Future zones gated as they ship:
              # "Waterways":  "hero",
              # "DwarvenRuin":"legend",
          }

          PACK_NAME_RE = re.compile(r"^[A-Za-z0-9_-]{1,64}$")

          CORS_ORIGINS = {SITE_DOMAIN, "http://localhost:4321", "http://localhost:4322"}

          def build_cors(event):
              origin = (event.get("headers") or {}).get("origin", SITE_DOMAIN)
              allow = origin if origin in CORS_ORIGINS else SITE_DOMAIN
              return {
                  "Access-Control-Allow-Origin": allow,
                  "Access-Control-Allow-Headers": "Content-Type,Authorization",
                  "Access-Control-Allow-Methods": "GET,OPTIONS",
                  "Cache-Control": "no-store",
              }

          _secret_cache = {}
          def get_jwt_secret():
              if "jwt" not in _secret_cache:
                  sm = boto3.client("secretsmanager")
                  _secret_cache["jwt"] = sm.get_secret_value(
                      SecretId="allbyte-studio/jwt-secret"
                  )["SecretString"]
              return _secret_cache["jwt"]

          def verify_jwt(token, secret):
              try:
                  parts = token.split(".")
                  if len(parts) != 3:
                      return None
                  sig_input = f"{parts[0]}.{parts[1]}"
                  expected_sig = base64.urlsafe_b64encode(
                      hmac.new(secret.encode(), sig_input.encode(), hashlib.sha256).digest()
                  ).rstrip(b"=").decode()
                  if not hmac.compare_digest(parts[2], expected_sig):
                      return None
                  payload_b64 = parts[1] + "=" * (4 - len(parts[1]) % 4)
                  payload = json.loads(base64.urlsafe_b64decode(payload_b64))
                  if payload.get("exp", 0) < time.time():
                      return None
                  return payload
              except Exception:
                  return None

          def handler(event, context):
              cors = build_cors(event)
              qs = event.get("queryStringParameters") or {}
              pack = qs.get("pack", "")

              if not PACK_NAME_RE.match(pack):
                  return {"statusCode": 400, "headers": cors,
                          "body": json.dumps({"error": "invalid pack name"})}

              required_tier = PACK_TIER_REQUIREMENTS.get(pack)
              if required_tier is None:
                  return {"statusCode": 404, "headers": cors,
                          "body": json.dumps({"error": "unknown pack"})}

              user_id = None
              user_tier = "default"

              # Auth path: required for non-public packs, optional for public ones.
              if required_tier != "public":
                  auth_header = (event.get("headers") or {}).get("authorization", "")
                  if not auth_header.lower().startswith("bearer "):
                      return {"statusCode": 401, "headers": cors,
                              "body": json.dumps({"error": "auth required"})}
                  token = auth_header.split(" ", 1)[1].strip()
                  payload = verify_jwt(token, get_jwt_secret())
                  if not payload:
                      return {"statusCode": 401, "headers": cors,
                              "body": json.dumps({"error": "invalid or expired token"})}
                  user_id = payload.get("sub")
                  user_tier = payload.get("tier", "default")
                  if TIER_RANK.get(user_tier, 0) < TIER_RANK.get(required_tier, 0):
                      print(f"AUDIT: user={user_id} tier={user_tier} denied {pack} (needs {required_tier})")
                      return {"statusCode": 403, "headers": cors,
                              "body": json.dumps({"error": "tier insufficient"})}

              # Mint the signed URL
              try:
                  signed_url = s3.generate_presigned_url(
                      "get_object",
                      Params={"Bucket": BUCKET, "Key": f"packs/{pack}.pck"},
                      ExpiresIn=TTL,
                  )
              except Exception as e:
                  print(f"ERROR: presign failed for {pack}: {e}")
                  return {"statusCode": 500, "headers": cors,
                          "body": json.dumps({"error": "internal error"})}

              # Audit log: who requested what (user_id may be None for public packs)
              print(f"AUDIT: user={user_id or 'anonymous'} tier={user_tier} granted {pack}")

              return {
                  "statusCode": 200,
                  "headers": {**cors, "Content-Type": "application/json"},
                  "body": json.dumps({"url": signed_url, "ttl": TTL}),
              }

